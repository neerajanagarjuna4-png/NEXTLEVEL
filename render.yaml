services:
  - type: web_service
    name: nextlevel-backend
    env: node
    plan: starter
    region: oregon
    branch: main
    repo: https://github.com/<owner>/<repo>
    path: backend
    buildCommand: "npm ci"
    startCommand: "npm start"
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '5000'
      - key: MONGODB_URI
        value: ''
      - key: JWT_SECRET
        value: ''
      - key: FRONTEND_URL
        value: ''
      - key: APP_URL
        value: ''
      - key: MENTOR_MASTER_PASSWORD
        value: ''
      - key: EMAIL_HOST
        value: ''
      - key: EMAIL_PORT
        value: ''
      - key: EMAIL_USER
        value: ''
      - key: EMAIL_PASS
        value: ''
      - key: MENTOR_EMAIL
        value: ''
